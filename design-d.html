<meta charset="utf-8">
<title>レシピ図書館 案D 今っぽい ver3</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef1f5; --card:#ffffff; --ink:#1b1d22; --sub:#5f636b; --muted:#9aa0a8; --line:#e5e9ef;
    --dark:#23262c; --soft:#eef2f7;
    --jp:"Noto Sans JP","Hiragino Sans",system-ui,sans-serif;
    --en:"Outfit","Noto Sans JP",system-ui,sans-serif;
    --sh:0 8px 26px rgba(30,40,60,.07);
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{background:var(--bg); color:var(--ink); font-family:var(--jp); -webkit-font-smoothing:antialiased; letter-spacing:.01em}
  .phone{max-width:400px; margin:0 auto; min-height:100vh; position:relative; padding-bottom:100px;
    background:linear-gradient(180deg,#f7f9fc 0%, var(--bg) 220px)}

  .top{padding:22px 20px 2px}
  .hello{font-size:11.5px; color:var(--muted); font-weight:700; letter-spacing:.06em}
  .htitle{font-size:21px; font-weight:900; letter-spacing:-.01em; margin-top:3px; line-height:1.25}
  .search{margin:15px 0 2px; display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:15px; padding:12px 15px; box-shadow:var(--sh)}
  .search input{border:none; outline:none; flex:1; font-size:13.5px; background:transparent; font-family:inherit; color:var(--ink)}
  .search input::placeholder{color:var(--muted)}
  .search .mg{font-size:15px; color:var(--sub)}

  .chips{display:flex; gap:8px; overflow-x:auto; padding:14px 20px 4px; scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap; font-size:12.5px; font-weight:700; padding:8px 14px; border-radius:999px; background:var(--card); border:1px solid var(--line); color:var(--sub); cursor:pointer}
  .chip.on{background:var(--dark); border-color:var(--dark); color:#fff}

  .sec{display:flex; align-items:center; justify-content:space-between; padding:18px 20px 2px}
  .sec h2{font-size:16.5px; font-weight:900; letter-spacing:-.01em}
  .sec .more{font-size:11.5px; font-weight:700; color:var(--sub); font-family:var(--en)}

  .feed{padding:11px 15px 4px; display:grid; grid-template-columns:1fr 1fr; gap:13px}
  .card{background:var(--card); border-radius:19px; overflow:hidden; box-shadow:var(--sh); cursor:pointer; transition:transform .15s ease}
  .card:active{transform:scale(.98)}
  .thumb{position:relative; width:100%; aspect-ratio:4/5; overflow:hidden; background:var(--soft)}
  .thumb img, .thumb video{width:100%; height:100%; object-fit:cover; display:block}
  .badge{position:absolute; width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,.8); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); display:grid; place-items:center; font-size:12px; box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .heart{top:9px; left:9px; color:#ff5d7a}
  .play{top:9px; right:9px; color:var(--ink)}
  .kcal{position:absolute; left:9px; bottom:9px; background:rgba(29,27,22,.66); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); color:#fff; font-size:10.5px; font-weight:700; padding:3px 10px; border-radius:999px; font-variant-numeric:tabular-nums; font-family:var(--en)}
  .meta{padding:10px 12px 13px}
  .title{font-size:13px; line-height:1.4; font-weight:700}
  .ing{margin-top:5px; font-size:10.5px; color:var(--muted); line-height:1.5}

  .tabbar{position:fixed; left:50%; transform:translateX(-50%); bottom:16px; width:min(352px,90%); z-index:20;
    display:flex; justify-content:space-around; align-items:center; padding:11px 10px;
    background:rgba(255,255,255,.72); backdrop-filter:blur(22px) saturate(1.4); -webkit-backdrop-filter:blur(22px) saturate(1.4);
    border:1px solid rgba(255,255,255,.75); border-radius:24px; box-shadow:0 12px 36px rgba(20,25,20,.16)}
  .tab{display:flex; flex-direction:column; align-items:center; gap:3px; font-size:9.5px; font-weight:700; color:var(--muted); cursor:pointer}
  .tab .i{font-size:18px; line-height:1}
  .tab.on{color:var(--ink)}
  .tab.fab .i{width:50px; height:50px; margin-top:-27px; border-radius:18px; background:var(--dark); color:#fff; display:grid; place-items:center; font-size:22px; box-shadow:0 10px 22px rgba(36,34,29,.4)}
  .tab.fab span:last-child{color:var(--ink)}
</style>
<div class="phone">
  <div class="top">
    <div class="hello">こんばんは、ゆりこ 🌙</div>
    <div class="htitle">今日は何つくる？</div>
    <div class="search"><span class="mg">🔍</span><input placeholder="レシピ・食材でさがす" /></div>
  </div>
  <div class="chips">
    <span class="chip on">🍳 作れる 14</span>
    <span class="chip">⏱ 時短</span>
    <span class="chip">🥗 ヘルシー</span>
    <span class="chip">🍜 麺</span>
    <span class="chip">🍰 おやつ</span>
  </div>

  <div class="sec"><h2>今日つくれる</h2><span class="more">すべて →</span></div>
  <div class="feed">
    <div class="card"><div class="thumb"><video src="assets/963c888658.mp4#t=0.1" muted playsinline preload="metadata"></video><span class="badge heart">♡</span><span class="badge play">▶</span></div><div class="meta"><div class="title">ツナマヨにんじんサラダ</div><div class="ing">にんじん・ツナ缶・マヨネーズ</div></div></div>
    <div class="card"><div class="thumb"><video src="assets/ac52f3ff12.mp4#t=0.1" muted playsinline preload="metadata"></video><span class="badge heart">♡</span><span class="badge play">▶</span><span class="kcal">13 kcal</span></div><div class="meta"><div class="title">ヘルシーわらび餅</div><div class="ing">水・ラカンカ・オオバコ</div></div></div>
    <div class="card"><div class="thumb"><video src="assets/89671a0588.mp4#t=0.1" muted playsinline preload="metadata"></video><span class="badge heart">♡</span><span class="badge play">▶</span></div><div class="meta"><div class="title">豆乳キムチ春雨</div><div class="ing">春雨・豆乳・キムチ</div></div></div>
    <div class="card"><div class="thumb"><video src="assets/3a28ded828.mp4#t=0.1" muted playsinline preload="metadata"></video><span class="badge heart">♡</span><span class="badge play">▶</span></div><div class="meta"><div class="title">ゆず大根</div><div class="ing">大根・大葉・めんつゆ</div></div></div>
  </div>

  <div class="sec"><h2>保存したレシピ</h2><span class="more">すべて →</span></div>
  <div class="feed">
    <div class="card"><div class="thumb"><img src="assets/3d305e1210.jpg"><span class="badge heart">♡</span></div><div class="meta"><div class="title">タルティーヌ集</div><div class="ing">バゲット・クリームチーズ・いちじく</div></div></div>
    <div class="card"><div class="thumb"><img src="https://img.youtube.com/vi/lnsoGU2dSgg/hqdefault.jpg"><span class="badge heart">♡</span><span class="badge play">▶</span><span class="kcal">400 kcal</span></div><div class="meta"><div class="title">完全栄養冷凍ブリトー</div><div class="ing">薄力粉・片栗粉・オリーブオイル</div></div></div>
  </div>

  <nav class="tabbar">
    <div class="tab on"><span class="i">⌂</span>ホーム</div>
    <div class="tab"><span class="i">🔍</span>さがす</div>
    <div class="tab fab"><span class="i">📷</span></div>
    <div class="tab"><span class="i">🛒</span>買い物</div>
    <div class="tab"><span class="i">♡</span>マイ</div>
  </nav>
</div>
