<meta charset="utf-8">
<title>レシピ図書館 案C カラフルキュート</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#fdfaff; --card:#ffffff; --ink:#2a2540; --muted:#a49fbe; --line:#efeaf7;
    --lav:#8b7bf0; --pink:#ff8fc4; --mint:#57d6b3; --sky:#6fc6ff; --sun:#ffcf5c;
    --grad:linear-gradient(115deg,#8b7bf0 0%,#ff8fc4 60%,#ffcf5c 100%);
    --sans:"Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic",system-ui,sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{background:var(--bg); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased}
  .phone{max-width:400px; margin:0 auto; min-height:100vh}
  header{position:sticky; top:0; z-index:5; background:rgba(253,250,255,.88); backdrop-filter:blur(12px); padding:16px 18px 0}
  .brandrow{display:flex; align-items:center; justify-content:space-between}
  .brand{font-size:23px; font-weight:800; letter-spacing:.02em; background:var(--grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent}
  .icons{display:flex; gap:8px}
  .iconbtn{width:40px; height:40px; border:none; background:#fff; box-shadow:0 3px 10px rgba(139,123,240,.16); border-radius:14px; font-size:16px; display:grid; place-items:center; cursor:pointer; color:var(--lav)}
  .seg{display:flex; gap:8px; margin-top:16px; padding-bottom:14px; overflow-x:auto}
  .seg span{white-space:nowrap; font-size:13px; font-weight:800; color:var(--muted); padding:9px 16px; border-radius:999px; background:#fff; box-shadow:0 2px 8px rgba(139,123,240,.1); cursor:pointer}
  .seg span.on{color:#fff; background:var(--grad); box-shadow:0 4px 12px rgba(255,143,196,.4)}
  .seg .n{margin-left:4px; font-variant-numeric:tabular-nums}
  .feed{padding:16px 14px 40px; display:grid; grid-template-columns:1fr 1fr; gap:14px}
  .eyebrow{grid-column:1/-1; display:flex; align-items:center; gap:8px; margin:8px 4px 0; font-size:16px; font-weight:800}
  .eyebrow .s{background:var(--grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent}
  .card{background:var(--card); border-radius:22px; overflow:hidden; box-shadow:0 6px 18px rgba(139,123,240,.12); cursor:pointer}
  .thumb{position:relative; width:100%; aspect-ratio:1/1; overflow:hidden; background:#f3eefc}
  .thumb img, .thumb video{width:100%; height:100%; object-fit:cover; display:block}
  .vbadge{position:absolute; top:9px; right:9px; width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,.85); color:var(--lav); display:grid; place-items:center; font-size:11px}
  .kcal{position:absolute; left:9px; bottom:9px; background:#fff; color:var(--pink); font-size:11px; font-weight:800; padding:3px 10px; border-radius:999px; font-variant-numeric:tabular-nums; box-shadow:0 2px 6px rgba(255,143,196,.3)}
  .meta{padding:10px 12px 13px}
  .title{font-size:13.5px; line-height:1.4; font-weight:800; letter-spacing:.01em}
  .ing{margin-top:4px; font-size:10.5px; color:var(--muted); line-height:1.5}
</style>
<div class="phone">
  <header>
    <div class="brandrow">
      <div class="brand">レシピ図書館</div>
      <div class="icons"><button class="iconbtn">⌕</button><button class="iconbtn">☰</button></div>
    </div>
    <div class="seg"><span class="on">すべて</span><span>作りたい<span class="n">3</span></span><span>作れる<span class="n">14</span></span><span>定番</span></div>
  </header>
  <div class="feed">
    <div class="eyebrow"><span class="s">✦ 今日つくれる</span></div>
    <div class="card"><div class="thumb"><video src="assets/963c888658.mp4#t=0.1" muted playsinline preload="metadata"></video><span class="vbadge">▶</span></div><div class="meta"><div class="title">ツナマヨにんじんサラダ</div><div class="ing">にんじん・ツナ缶・マヨネーズ</div></div></div>
    <div class="card"><div class="thumb"><video src="assets/ac52f3ff12.mp4#t=0.1" muted playsinline preload="metadata"></video><span class="vbadge">▶</span><span class="kcal">13 kcal</span></div><div class="meta"><div class="title">ヘルシーわらび餅</div><div class="ing">水・ラカンカ・オオバコ</div></div></div>
    <div class="card"><div class="thumb"><video src="assets/89671a0588.mp4#t=0.1" muted playsinline preload="metadata"></video><span class="vbadge">▶</span></div><div class="meta"><div class="title">豆乳キムチ春雨</div><div class="ing">春雨・豆乳・キムチ</div></div></div>
    <div class="eyebrow"><span class="s">✦ 保存したレシピ</span></div>
    <div class="card"><div class="thumb"><img src="assets/3d305e1210.jpg"></div><div class="meta"><div class="title">タルティーヌ集</div><div class="ing">バゲット・クリームチーズ・いちじく</div></div></div>
    <div class="card"><div class="thumb"><img src="https://img.youtube.com/vi/lnsoGU2dSgg/hqdefault.jpg"><span class="vbadge">▶</span><span class="kcal">400 kcal</span></div><div class="meta"><div class="title">完全栄養冷凍ブリトー</div><div class="ing">薄力粉・片栗粉・オリーブオイル</div></div></div>
    <div class="card"><div class="thumb"><video src="assets/3a28ded828.mp4#t=0.1" muted playsinline preload="metadata"></video><span class="vbadge">▶</span></div><div class="meta"><div class="title">ゆず大根</div><div class="ing">大根・大葉・めんつゆ</div></div></div>
    <div class="card"><div class="thumb"><video src="assets/7e3b6903cf.mp4#t=0.1" muted playsinline preload="metadata"></video><span class="vbadge">▶</span></div><div class="meta"><div class="title">ちゅるん豆腐</div><div class="ing">豆乳・ゼラチン・塩</div></div></div>
  </div>
</div>
