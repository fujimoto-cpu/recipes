<meta charset="utf-8">
<title>レシピ図書館 案B ミニマル白</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#ffffff; --card:#ffffff; --ink:#161310; --muted:#9b958c; --line:#eeeeee;
    --accent:#e2483a; --accent-soft:#fdeeec; --chipbg:#f5f4f2;
    --sans:"Hiragino Sans","Yu Gothic",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{background:var(--bg); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased}
  .phone{max-width:400px; margin:0 auto; min-height:100vh}
  header{position:sticky; top:0; z-index:5; background:rgba(255,255,255,.9); backdrop-filter:blur(12px); border-bottom:1px solid var(--line); padding:16px 18px 0}
  .brandrow{display:flex; align-items:center; justify-content:space-between}
  .brand{font-size:22px; font-weight:800; letter-spacing:-.02em}
  .brand .dot{color:var(--accent)}
  .icons{display:flex; gap:8px}
  .iconbtn{width:38px; height:38px; border:none; background:var(--chipbg); border-radius:50%; font-size:16px; display:grid; place-items:center; cursor:pointer; color:var(--ink)}
  .seg{display:flex; gap:8px; margin-top:16px; padding-bottom:14px; overflow-x:auto}
  .seg span{white-space:nowrap; font-size:13px; font-weight:700; color:var(--muted); padding:8px 15px; border-radius:999px; background:var(--chipbg); cursor:pointer}
  .seg span.on{color:#fff; background:var(--ink)}
  .seg .n{margin-left:4px; font-variant-numeric:tabular-nums; opacity:.7}
  .feed{padding:16px 14px 40px; display:grid; grid-template-columns:1fr 1fr; gap:14px}
  .eyebrow{grid-column:1/-1; display:flex; align-items:baseline; justify-content:space-between; margin:6px 4px 0}
  .eyebrow b{font-size:16px; font-weight:800; letter-spacing:-.01em}
  .eyebrow .more{font-size:12px; color:var(--accent); font-weight:700}
  .card{cursor:pointer}
  .thumb{position:relative; width:100%; aspect-ratio:1/1; overflow:hidden; border-radius:16px; background:var(--chipbg)}
  .thumb img, .thumb video{width:100%; height:100%; object-fit:cover; display:block}
  .vbadge{position:absolute; top:9px; right:9px; width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,.9); color:var(--ink); display:grid; place-items:center; font-size:11px}
  .kcal{position:absolute; left:8px; bottom:8px; background:var(--accent); color:#fff; font-size:11px; font-weight:800; padding:3px 9px; border-radius:999px; font-variant-numeric:tabular-nums}
  .meta{padding:9px 3px 2px}
  .title{font-size:14px; line-height:1.35; font-weight:700; letter-spacing:-.01em}
  .ing{margin-top:4px; font-size:11px; color:var(--muted); line-height:1.45}
</style>
<div class="phone">
  <header>
    <div class="brandrow">
      <div class="brand">だいどころ<span class="dot">.</span></div>
      <div class="icons"><button class="iconbtn">⌕</button><button class="iconbtn">☰</button></div>
    </div>
    <div class="seg"><span class="on">すべて</span><span>作りたい<span class="n">3</span></span><span>作れる<span class="n">14</span></span><span>定番</span></div>
  </header>
  <div class="feed">
    <div class="eyebrow"><b>今日つくれる</b><span class="more">すべて見る →</span></div>
    <div class="card"><div class="thumb"><video src="assets/963c888658.mp4#t=0.1" muted playsinline preload="metadata"></video><span class="vbadge">▶</span></div><div class="meta"><div class="title">ツナマヨにんじんサラダ</div><div class="ing">にんじん・ツナ缶・マヨネーズ</div></div></div>
    <div class="card"><div class="thumb"><video src="assets/ac52f3ff12.mp4#t=0.1" muted playsinline preload="metadata"></video><span class="vbadge">▶</span><span class="kcal">13 kcal</span></div><div class="meta"><div class="title">ヘルシーわらび餅</div><div class="ing">水・ラカンカ・オオバコ</div></div></div>
    <div class="card"><div class="thumb"><video src="assets/89671a0588.mp4#t=0.1" muted playsinline preload="metadata"></video><span class="vbadge">▶</span></div><div class="meta"><div class="title">豆乳キムチ春雨</div><div class="ing">春雨・豆乳・キムチ</div></div></div>
    <div class="eyebrow"><b>保存したレシピ</b><span class="more">すべて見る →</span></div>
    <div class="card"><div class="thumb"><img src="assets/3d305e1210.jpg"></div><div class="meta"><div class="title">タルティーヌ集</div><div class="ing">バゲット・クリームチーズ・いちじく</div></div></div>
    <div class="card"><div class="thumb"><img src="https://img.youtube.com/vi/lnsoGU2dSgg/hqdefault.jpg"><span class="vbadge">▶</span><span class="kcal">400 kcal</span></div><div class="meta"><div class="title">完全栄養冷凍ブリトー</div><div class="ing">薄力粉・片栗粉・オリーブオイル</div></div></div>
    <div class="card"><div class="thumb"><video src="assets/3a28ded828.mp4#t=0.1" muted playsinline preload="metadata"></video><span class="vbadge">▶</span></div><div class="meta"><div class="title">ゆず大根</div><div class="ing">大根・大葉・めんつゆ</div></div></div>
    <div class="card"><div class="thumb"><video src="assets/7e3b6903cf.mp4#t=0.1" muted playsinline preload="metadata"></video><span class="vbadge">▶</span></div><div class="meta"><div class="title">ちゅるん豆腐</div><div class="ing">豆乳・ゼラチン・塩</div></div></div>
  </div>
</div>
