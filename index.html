<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レシピ図書館</title>
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>
<header class="topbar">
  <div class="topbar-row">
    <div>
      <h1>🍳 レシピ図書館</h1>
      <p class="subtitle">保存したレシピを画像・動画つきで一覧。食材から逆引き＆カロリー順で探せる。</p>
    </div>
    <button id="cart-button">🛒 買い物リスト <span id="cart-count">0</span></button>
  </div>
</header>

<main>
  <section class="tabs" id="tabs">
    <button class="tab active" data-view="all">🍽 すべて</button>
    <button class="tab" data-view="want">♡ 作りたい <span class="tab-n">0</span></button>
    <button class="tab" data-view="staple">⭐ マイ定番 <span class="tab-n">0</span></button>
    <button class="tab" data-view="cookable">🍳 作れる <span class="tab-n">0</span></button>
  </section>

  <section class="pantry-bar" id="pantry-bar"></section>
  <div class="pantry-actions">
    <button id="add-buys-btn" class="add-buys-btn">📸 買ったもの追加</button>
  </div>

  <section class="controls">
    <input type="text" id="search" placeholder="料理名・食材・タグで検索" />
    <div class="control-buttons">
      <button id="sort-kcal">🔥 低カロリー順</button>
      <button id="reset-all">↺ すべて表示</button>
    </div>
  </section>

  <section class="chips" id="chips"></section>

  <p class="match-count" id="match-count"></p>

  <section class="grid" id="grid"></section>
</main>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<div class="modal-overlay" id="cart-overlay">
  <div class="modal" id="cart-content"></div>
</div>

<div class="modal-overlay" id="buys-overlay">
  <div class="modal" id="buys-content"></div>
</div>

<script src="app.js?v=3"></script>
</body>
</html>
