<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レシピ図書館</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=4">
</head>
<body>
<div class="app">
  <header class="top">
    <div class="hello" id="hello">こんにちは</div>
    <h1 class="htitle">今日は何つくる？</h1>
    <div class="search">
      <span class="mg">🔍</span>
      <input type="text" id="search" placeholder="レシピ・食材でさがす" />
    </div>
  </header>

  <section class="tabs" id="tabs">
    <button class="tab active" data-view="all">すべて</button>
    <button class="tab" data-view="cookable">🍳 作れる <span class="tab-n">0</span></button>
    <button class="tab" data-view="want">♡ 作りたい <span class="tab-n">0</span></button>
    <button class="tab" data-view="staple">⭐ マイ定番 <span class="tab-n">0</span></button>
  </section>

  <button class="filter-toggle" id="filter-toggle">🎛 食材・在庫で絞り込む <span class="chev">▾</span></button>
  <div class="filter-panel" id="filter-panel">
    <section class="pantry-bar" id="pantry-bar"></section>
    <div class="pantry-actions">
      <button id="add-buys-btn" class="add-buys-btn">📸 買ったもの追加</button>
    </div>
    <div class="controls">
      <button id="sort-kcal">🔥 低カロリー順</button>
      <button id="reset-all">↺ すべて表示</button>
    </div>
    <section class="chips" id="chips"></section>
  </div>

  <div class="sec">
    <h2 id="sec-title">すべてのレシピ</h2>
    <span class="more" id="match-count"></span>
  </div>

  <section class="grid" id="grid"></section>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<div class="modal-overlay" id="cart-overlay">
  <div class="modal" id="cart-content"></div>
</div>

<div class="modal-overlay" id="buys-overlay">
  <div class="modal" id="buys-content"></div>
</div>

<nav class="tabbar">
  <button class="navtab on" data-nav="home"><span class="i">⌂</span>ホーム</button>
  <button class="navtab" data-nav="search"><span class="i">🔍</span>さがす</button>
  <button class="navtab fab" data-nav="photo"><span class="i">📷</span></button>
  <button class="navtab" data-nav="cart"><span class="i">🛒</span>買い物<span class="navbadge" id="cart-count">0</span></button>
  <button class="navtab" data-nav="mine"><span class="i">♡</span>マイ</button>
</nav>

<script src="app.js?v=4"></script>
</body>
</html>
